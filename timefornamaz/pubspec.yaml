name: timefornamaz
description: Time for Namaz - Prayer Time App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.4
  audioplayers: ^6.0.0
  geolocator: ^13.0.0
  http: ^1.2.2
  shared_preferences: ^2.3.2
  flutter_animate: ^4.5.0
  permission_handler: ^11.3.1
  intl: ^0.19.0
  timezone: ^0.9.4
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/images/
