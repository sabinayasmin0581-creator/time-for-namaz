workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      flutter: 3.19.0
      java: 17
    scripts:
      - name: Get Flutter packages
        script: |
          cd timefornamaz
          flutter pub get
      - name: Build APK
        script: |
          cd timefornamaz
          flutter build apk --debug --no-tree-shake-icons
    artifacts:
      - timefornamaz/build/app/outputs/flutter-apk/app-debug.apk
